name: PyLint

on:
  push:
    branches:
      - "master"
    paths:
      - "backend/**"
      - ".github/workflows/pylint.yml"
  pull_request:
    branches:
      - "master"
    paths:
      - "backend/**"
      - ".github/workflows/pylint.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install neccessary packages
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/python -m pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt
          backend/.venv/bin/pip install ruff pyrefly
      - name: Sort imports with Ruff
        run: |
          backend/.venv/bin/ruff check . --select I --fix
      - name: Format with Ruff
        run: |
          backend/.venv/bin/ruff format .
      - name: Check types with Pyrefly
        continue-on-error: false
        run: |
          backend/.venv/bin/pyrefly check
      - name: Commit autofixes
        run: |
          if git diff --quiet; then
            echo "No Ruff changes to commit!"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "Apply Ruff formatting"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
